name: Style

on:
  # Only run on pull requests targeting master/main.  The Auto-format
  # workflow already runs on every push to feature branches and pushes a
  # fixup commit when needed, so running format checks on `push` would be
  # redundant.  Restricting to `pull_request` halves the number of format
  # runs visible in the PR Checks UI.
  pull_request:
    branches:
      - master
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Safe to cancel: this workflow only runs on `pull_request`, and the
  # Auto-format bot fires on `push`, so the two events never share the same
  # concurrency group.  Cancelling stale runs avoids piling up checks when a
  # PR is updated rapidly.
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-format:
    # Format violations are warnings, never errors — keep the workflow green
    # even if the clang installation step has a transient failure.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: install clang-format
        uses: ./.github/actions/install-clang
        with:
          version: 21
          packages: clang-format

      - name: validate clang-format
        run: |
          echo "## Clang-format version" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          clang-format --version >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: check C++ format
        # Format violations are reported as warnings and annotations but do NOT
        # fail the workflow — the Auto-format job will push a fixup commit on
        # the next push.  Keeping this non-blocking means a Copilot or
        # automated commit that used a different clang-format version never
        # stalls an otherwise-green CI run.
        run: |
          set +e
          VIOLATIONS=$(git ls-files -z \
              '*.h' '*.c' '*.hpp' '*.cpp' '*.hxx' '*.cxx' \
              '*.hh' '*.cc' '*.ipp' '*.inc' '*.inl' \
              ':(exclude)cmake/' \
            | xargs -0 clang-format --dry-run -Werror 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "$VIOLATIONS"

            # Emit a single workflow-level warning annotation
            echo "::warning title=clang-format::Some C++ files need formatting. \
          The Auto-format workflow will push a fix automatically. \
          To fix locally run: git ls-files -z '*.h' '*.c' '*.hpp' '*.cpp' '*.hxx' '*.cxx' '*.hh' '*.cc' '*.ipp' '*.inc' '*.inl' ':(exclude)cmake/' | xargs -0 clang-format -i"

            # Parse violation lines and emit per-file annotations
            echo "$VIOLATIONS" | grep ': error:' | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE=$(echo "$line" | cut -d: -f2)
              echo "::warning file=$FILE,line=$LINE::clang-format violation"
            done

            # Summary
            N=$(echo "$VIOLATIONS" | grep -c ': error:' || true)
            echo "## ⚠️ clang-format: $N violation(s)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The **Auto-format** workflow will push a fixup commit automatically." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To fix locally:" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "git ls-files -z '*.h' '*.c' '*.hpp' '*.cpp' '*.hxx' '*.cxx' '*.hh' '*.cc' '*.ipp' '*.inc' '*.inl' ':(exclude)cmake/' \\" >> $GITHUB_STEP_SUMMARY
            echo "  | xargs -0 clang-format -i" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ clang-format: no violations" >> $GITHUB_STEP_SUMMARY
          fi
          # Always exit 0 — violations are warnings, not errors
          exit 0

      - name: run strong-type hygiene lint
        # Forbid re-introduction of the `static_cast<Uid>(...)`,
        # `StrongIndex{static_cast<Index>(...size())}`, and raw `±1` arithmetic
        # on positional strong indices that the strong-type hygiene PRs
        # eliminated.  Runs the repo-local `tools/lint_strong_types.sh`.
        #
        # Marked as warnings-only (always exits 0) while the call-site
        # migration PRs are in flight — master still carries a handful of
        # hits that those PRs will clear.  Flip `exit 0` → `exit $EXIT_CODE`
        # in a follow-up PR once the cleanup is complete.
        run: |
          set +e
          LINT_OUT=$(bash tools/lint_strong_types.sh 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "$LINT_OUT"
            echo "::warning title=strong-type-lint::Strong-type hygiene violations detected. See tools/lint_strong_types.sh for the ruleset."
            echo "## ⚠️ strong-type-lint: violations detected" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$LINT_OUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "$LINT_OUT"
            echo "## ✅ strong-type-lint: no violations" >> $GITHUB_STEP_SUMMARY
          fi
          # Warnings-only while call-site migration is in flight.
          exit 0

  check-python-format:
    # Format violations are warnings, never errors — keep the workflow green
    # even if the ruff installation step has a transient failure.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            scripts/pyproject.toml
            guiservice/pyproject.toml

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: check Python format (ruff format)
        # Like clang-format, ruff format violations are warnings only — the
        # Auto-format workflow will push a fixup commit automatically.
        run: |
          set +e
          RUFF_OUT=$(ruff format --check scripts/ guiservice/ 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "$RUFF_OUT"
            echo "::warning title=ruff-format::Some Python files need formatting. The Auto-format workflow will push a fix automatically. To fix locally run: ruff format scripts/ guiservice/"

            N=$(echo "$RUFF_OUT" | grep -c '^Would reformat' || true)
            echo "## ⚠️ ruff format: $N file(s) need reformatting" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The **Auto-format** workflow will push a fixup commit automatically." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To fix locally: \`ruff format scripts/ guiservice/\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ ruff format: no violations" >> $GITHUB_STEP_SUMMARY
          fi
          # Always exit 0 — violations are warnings, not errors
          exit 0

