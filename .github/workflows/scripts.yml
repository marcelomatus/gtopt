name: Scripts
# uv package cache added to all jobs (actions/cache@v4 → ~/.cache/uv)

on:
  push:
    branches:
      - master
      - main
    paths:
      - "scripts/**"
      - "scripts/pyproject.toml"
      - ".github/workflows/scripts.yml"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "scripts/**"
      - "scripts/pyproject.toml"
      - ".github/workflows/scripts.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read  # needed to download the gtopt-binary-debug CI artifact

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv
        run: pip install uv

      - name: Install scripts package and dev dependencies
        run: uv pip install --system -e "./scripts[dev]" graphviz

      - name: Run unit tests with coverage
        working-directory: scripts
        run: |
          pytest \
            --ignore=plp2gtopt/tests/test_integration.py \
            -q --tb=short -m "not integration" \
            --cov=cvs2parquet \
            --cov=igtopt \
            --cov=plp2gtopt \
            --cov=pp2gtopt \
            --cov=ts2gtopt \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Check coverage threshold (warning only)
        working-directory: scripts
        run: |
          coverage report --fail-under=83 || \
            echo "::warning title=Coverage::Unit-test coverage is below 83% threshold"
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-xml
          path: scripts/coverage.xml
          retention-days: 30

      - name: Generate coverage summary
        working-directory: scripts
        run: |
          python - <<'EOF'
          import os
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          line_rate = float(root.get("line-rate", 0)) * 100
          branch_rate = float(root.get("branch-rate", 0)) * 100
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary_file, "a") as f:
              f.write("## Python Scripts Coverage\n\n")
              f.write("| Metric | Coverage |\n|--------|----------|\n")
              f.write(f"| Lines  | {line_rate:.1f}% |\n")
              f.write(f"| Branches | {branch_rate:.1f}% |\n")
          EOF

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: integration-tests
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv
        run: pip install uv

      - name: Install scripts package and dev dependencies
        run: uv pip install --system -e "./scripts[dev]" graphviz

      - name: Download gtopt binary and install runtime libraries
        run: |
          # Download the binary from the latest CI artifact and install any
          # missing runtime libraries (skipped automatically if already present,
          # e.g. when the ubuntu.yml build job runs first on this runner).
          # Log messages go to stderr; the binary path is printed to stdout.
          GTOPT_BIN=$(python tools/get_gtopt_binary.py 2>/tmp/gtopt_dl.log)
          RC=$?
          if [ $RC -ne 0 ]; then
            echo "ERROR: failed to obtain gtopt binary – full output:" >&2
            cat /tmp/gtopt_dl.log >&2
            exit $RC
          fi
          echo "GTOPT_BIN=$GTOPT_BIN" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run integration tests
        working-directory: scripts
        run: |
          pytest \
            plp2gtopt/tests/test_integration.py \
            igtopt/tests \
            ts2gtopt/tests \
            -v -m integration \
            --tb=short
        env:
          GTOPT_BIN: ${{ env.GTOPT_BIN }}

  cmake-install:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: cmake-install
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv
        run: pip install uv

      # Pre-install runtime deps before cmake configure so that cmake's
      # find_program(PYTHON_EXECUTABLE) picks the same Python whose packages
      # are already cached, and the cmake --install pip step is faster.
      - name: Pre-install scripts runtime dependencies
        run: uv pip install --system -e "./scripts"

      - name: Configure scripts with CMake
        run: cmake -S scripts -B build-scripts

      - name: Install scripts via cmake --install
        run: cmake --install build-scripts

      - name: Verify installed entry-point scripts are on PATH
        run: |
          plp2gtopt --version
          echo "✓ plp2gtopt found on PATH after cmake --install"
          pp2gtopt --version
          echo "✓ pp2gtopt found on PATH after cmake --install"
          gtopt_diagram --help > /dev/null
          echo "✓ gtopt_diagram found on PATH after cmake --install"
          ts2gtopt --help > /dev/null
          echo "✓ ts2gtopt found on PATH after cmake --install"

      - name: plp_min_1bus – convert and validate JSON
        run: |
          mkdir -p /tmp/out_min_1bus
          plp2gtopt \
            -i scripts/cases/plp_min_1bus \
            -o /tmp/out_min_1bus \
            -f /tmp/out_min_1bus/gtopt_case.json
          python3 - <<'EOF'
          import json, sys
          d = json.load(open("/tmp/out_min_1bus/gtopt_case.json"))
          assert d["system"]["bus_array"][0]["name"] == "Bus1", \
              f"Wrong bus name: {d['system']['bus_array'][0]['name']}"
          assert len(d["system"]["generator_array"]) == 1
          assert d["system"]["generator_array"][0]["name"] == "Thermal1"
          assert len(d["simulation"]["block_array"]) == 1
          print("✓ plp_min_1bus JSON validated")
          EOF

      - name: plp_min_2bus – convert and validate JSON
        run: |
          mkdir -p /tmp/out_min_2bus
          plp2gtopt \
            -i scripts/cases/plp_min_2bus \
            -o /tmp/out_min_2bus \
            -f /tmp/out_min_2bus/gtopt_case.json
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/out_min_2bus/gtopt_case.json"))
          assert len(d["system"]["bus_array"]) == 2
          assert len(d["system"]["generator_array"]) == 2
          assert len(d["system"]["line_array"]) == 1
          assert len(d["simulation"]["stage_array"]) == 2
          print("✓ plp_min_2bus JSON validated")
          EOF

      - name: plp_min_bess – convert and validate battery JSON
        run: |
          mkdir -p /tmp/out_min_bess
          plp2gtopt \
            -i scripts/cases/plp_min_bess \
            -o /tmp/out_min_bess \
            -f /tmp/out_min_bess/gtopt_case.json
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/out_min_bess/gtopt_case.json"))
          assert len(d["system"].get("battery_array", [])) == 1, \
              "Expected 1 battery"
          bat = d["system"]["battery_array"][0]
          assert bat["name"] == "BESS1"
          # Unified battery definition: bus field set, no separate converter
          assert "bus" in bat, "Expected unified battery with 'bus' field"
          assert "converter_array" not in d["system"], \
              "Unified battery should not produce converter_array"
          print("✓ plp_min_bess JSON validated")
          EOF

      - name: plp_min_hydro – convert with 2 hydrologies and validate JSON
        run: |
          mkdir -p /tmp/out_min_hydro
          plp2gtopt \
            -i scripts/cases/plp_min_hydro \
            -o /tmp/out_min_hydro \
            -f /tmp/out_min_hydro/gtopt_case.json \
            -y 0,1
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/out_min_hydro/gtopt_case.json"))
          scenarios = d["simulation"]["scenario_array"]
          assert len(scenarios) == 2, f"Expected 2 scenarios, got {len(scenarios)}"
          assert abs(scenarios[0]["probability_factor"] - 0.5) < 1e-9
          assert abs(scenarios[1]["probability_factor"] - 0.5) < 1e-9
          assert d["system"]["generator_array"][0]["name"] == "HydroGen"
          print("✓ plp_min_hydro JSON validated")
          EOF

      - name: pp2gtopt – convert ieee30b and validate JSON
        run: |
          pp2gtopt -o /tmp/ieee30b.json
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/ieee30b.json"))
          assert d["system"]["name"] == "ieee30b"
          assert len(d["system"]["bus_array"]) == 30
          assert len(d["system"]["generator_array"]) == 6
          assert d["options"]["use_kirchhoff"] is True
          print("✓ pp2gtopt ieee30b JSON validated")
          EOF

      - name: pp2gtopt – convert from pandapower JSON file
        run: |
          python3 - <<'EOF'
          import pandapower as pp
          import pandapower.networks as pn
          net = pn.case9()
          pp.to_json(net, "/tmp/case9_pp.json")
          print("Saved case9 pandapower JSON to /tmp/case9_pp.json")
          EOF
          pp2gtopt -f /tmp/case9_pp.json -o /tmp/case9_gtopt.json
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/case9_gtopt.json"))
          assert d["system"]["name"] == "case9_pp"
          assert len(d["system"]["bus_array"]) == 9
          print("✓ pp2gtopt file-based conversion (JSON) validated")
          EOF

      - name: pp2gtopt – list-networks
        run: |
          pp2gtopt --list-networks
          echo "✓ pp2gtopt --list-networks works"

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv pip install --system -e "./scripts[dev]"

      - name: ruff (lint)
        working-directory: scripts
        run: ruff check .

      - name: pylint
        working-directory: scripts
        run: pylint --jobs=0 gtopt_compare cvs2parquet gtopt_diagram gtopt_field_extractor igtopt plp2gtopt pp2gtopt sddp_monitor ts2gtopt

      - name: mypy
        working-directory: scripts
        run: mypy gtopt_compare cvs2parquet gtopt_diagram gtopt_field_extractor igtopt plp2gtopt pp2gtopt sddp_monitor ts2gtopt --ignore-missing-imports
