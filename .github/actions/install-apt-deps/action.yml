name: Install APT build dependencies
description: >
  Installs C++ build dependencies (COIN-OR, Boost, spdlog) and Apache
  Arrow/Parquet from the official Apache Arrow APT repository.
  Sets DEBIAN_FRONTEND=noninteractive for the Arrow repository bootstrap step.

inputs:
  extra-packages:
    description: >
      Space-separated list of additional apt packages to install alongside the
      default set (e.g. "lcov" for coverage builds).
    default: ''

runs:
  using: composite
  steps:
    - name: install base packages
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          ccache lld coinor-libcbc-dev libboost-container-dev libspdlog-dev \
          liblapack-dev libblas-dev liblapack3 libblas3 lcov \
          zlib1g-dev libzstd-dev zstd ca-certificates lsb-release wget \
          ${{ inputs.extra-packages }}

    - name: ensure LAPACK runtime is present
      shell: bash
      run: |
        DEB_ARCH=$(dpkg --print-architecture)-linux-gnu
        sudo ldconfig
        sudo update-alternatives --auto "liblapack.so-${DEB_ARCH}" 2>/dev/null || true
        sudo update-alternatives --auto "libblas.so-${DEB_ARCH}" 2>/dev/null || true

    - name: add Apache Arrow APT repository
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        DISTRO=$(lsb_release --id --short | tr 'A-Z' 'a-z')
        CODENAME=$(lsb_release --codename --short)
        # Retry wget — packages.apache.org is intermittently unreachable.
        for attempt in 1 2 3; do
          wget -q "https://packages.apache.org/artifactory/arrow/${DISTRO}/apache-arrow-apt-source-latest-${CODENAME}.deb" \
            && break
          echo "Attempt $attempt/3: wget failed, retrying in 15s..."
          sleep 15
        done
        sudo apt-get install -y -q --no-install-recommends \
          "./apache-arrow-apt-source-latest-${CODENAME}.deb"
        # Full update after adding Arrow repo — Arrow packages depend on
        # system packages whose versions may have changed since the runner
        # image was built.
        for attempt in 1 2 3; do
          sudo apt-get update -q && break
          echo "Attempt $attempt/3: apt-get update failed, retrying in 15s..."
          sleep 15
        done

    - name: install Arrow and Parquet
      shell: bash
      run: |
        sudo apt-get install -y --no-install-recommends libarrow-dev libparquet-dev
