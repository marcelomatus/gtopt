name: Coverage

# Dedicated workflow for C++ and Python code-coverage reports.
#
# Produces:
#   - cpp-coverage-report : HTML coverage report (lcov/genhtml)
#   - python-coverage-report : Python HTML coverage report (pytest-cov)
#   - reports/coverage/coverage-summary.md committed back to the repo
#
# The coverage/ CMake sub-project orchestrates the full pipeline:
#   cmake -S coverage -B build-coverage && cmake --build build-coverage
#
# Triggers:
#   - workflow_dispatch : manual run at any time
#   - schedule          : every Sunday at 02:00 UTC (weekly baseline)

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: 'Compiler to use (gcc or clang)'
        type: choice
        options:
          - gcc
          - clang
        default: gcc
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  CCACHE_BASEDIR: ${{ github.workspace }}
  # Sloppiness is managed in ccache.conf by cmake_local/Ccache.cmake —
  # do NOT set CCACHE_SLOPPINESS here (env var would override the conf).

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    name: Coverage (${{ inputs.compiler || 'gcc' }})

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: gtopt-clang-coverage-${{ inputs.compiler || 'gcc' }}
          # Shared `gtopt-clang-` prefix lets coverage warm-start from the
          # ubuntu.yml / profile.yml caches and vice versa.  Object-flag
          # mismatch means no exact hits across workflows, but header parse
          # state still shaves time off the weekly cold start.
          restore-keys: |
            gtopt-clang-coverage-${{ inputs.compiler || 'gcc' }}-
            gtopt-clang-Ubuntu-${{ inputs.compiler || 'gcc' }}-
            gtopt-clang-
            coverage-${{ inputs.compiler || 'gcc' }}-
            Ubuntu-${{ inputs.compiler || 'gcc' }}-
          max-size: 2G

      - uses: actions/cache@v5
        with:
          path: "**/cpm_modules"
          key: coverage-${{ inputs.compiler || 'gcc' }}-cpm-modules-${{ hashFiles('cmake/CPM.cmake', 'cmake/tools.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            coverage-${{ inputs.compiler || 'gcc' }}-cpm-modules-
            Ubuntu-${{ inputs.compiler || 'gcc' }}-cpm-modules-

      - name: install dependencies
        uses: ./.github/actions/install-apt-deps

      # Default coverage compiler is the regular g++ (matches local dev and the
      # main Ubuntu build).  gcc-15 is not in the noble archive, so pull it from
      # the toolchain PPA.  NOTE: do NOT default this to clang here — the only
      # clang the coverage runtime pins is clang-21, which is a GH-sandbox-only
      # toolchain and mis-compiles `views::join | std::ranges::to<...>()`.
      - name: setup gcc
        if: ${{ (inputs.compiler || 'gcc') == 'gcc' }}
        uses: ./.github/actions/install-gcc
        with:
          version: 15
          toolchain-ppa: 'true'

      # Opt-in only (manual workflow_dispatch with compiler=clang).  install-clang
      # pins clang-21 (sandbox toolchain); prefer gcc for scheduled runs.
      - name: install clang
        if: ${{ (inputs.compiler || 'gcc') == 'clang' }}
        uses: ./.github/actions/install-clang
        with:
          version: 21
          install-coverage-runtime: 'true'

      - name: Set up Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Pre-install scripts dependencies
        run: uv pip install --system -q -e "./scripts[dev]" graphviz

      - name: Configure coverage sub-project
        run: |
          COMPILER="${{ inputs.compiler || 'gcc' }}"
          cmake -S coverage -B build-coverage \
            -DCOVERAGE_COMPILER="${COMPILER}" \
            -DCOVERAGE_OUTPUT_DIR="${PWD}/reports/coverage" \
            -DCOVERAGE_PYTHON=ON

      - name: Run full coverage analysis
        run: cmake --build build-coverage -j$(nproc)

      - name: Upload C++ coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: cpp-coverage-report-${{ inputs.compiler || 'gcc' }}
          path: reports/coverage/html/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Python coverage HTML report
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage-report
          path: reports/coverage/python/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload coverage.info artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-info-${{ inputs.compiler || 'gcc' }}
          path: reports/coverage/coverage.info
          retention-days: 14
          if-no-files-found: ignore

      - name: Write GitHub Actions step summary
        if: always()
        run: |
          SUMMARY_MD="reports/coverage/coverage-summary.md"
          if [ -f "${SUMMARY_MD}" ]; then
            cat "${SUMMARY_MD}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ⚠️ coverage-summary.md not found — check build logs." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "📥 Download the full HTML report from the **cpp-coverage-report** artifact." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit coverage reports back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f is required because .gitignore blocks the "reports" directory
          git add -f reports/coverage/
          git commit --allow-empty \
            -m "chore: update coverage report (${{ inputs.compiler || 'gcc' }}) [skip ci]" \
            || echo "Nothing to commit"
          git push || echo "Push failed (OK for PRs from forks)"
