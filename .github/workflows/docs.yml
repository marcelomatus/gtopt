name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'documentation/**'
      - 'include/**'
      - 'source/**'
      - '*.md'
      - 'tools/check_latex_math.py'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'docs/**'
      - 'documentation/**'
      - 'include/**'
      - 'source/**'
      - '*.md'
      - 'tools/check_latex_math.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

permissions:
  contents: read

jobs:
  check-latex-math:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint LaTeX math in Markdown
        run: |
          set +e
          OUTPUT=$(python tools/check_latex_math.py docs/ *.md 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            # Emit per-issue annotations
            echo "$OUTPUT" | grep -E '^[^:]+\.md:' | while IFS= read -r line; do
              FILE=$(echo "$line" | cut -d: -f1)
              LINE=$(echo "$line" | cut -d: -f2)
              MSG=$(echo "$line" | cut -d: -f3-)
              echo "::error file=$FILE,line=$LINE::$MSG"
            done

            N=$(echo "$OUTPUT" | grep -c '\.md:' || true)
            echo "## ❌ LaTeX math lint: $N issue(s)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Fix locally: \`python tools/check_latex_math.py docs/ *.md\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "## ✅ LaTeX math lint: no issues" >> $GITHUB_STEP_SUMMARY
          fi

  build-doxygen:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen
          pip3 install jinja2 Pygments

      - name: Build Doxygen documentation
        run: |
          cmake -S documentation -B build
          cmake --build build --target GenerateDocs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/doxygen/html/

  deploy-pages:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: build-doxygen
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Doxygen HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: doxygen-html
          path: site

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Warn on deployment failure
        if: steps.deployment.outcome == 'failure'
        run: |
          echo "::warning::GitHub Pages deployment failed. Ensure GitHub Pages is enabled in repo settings (Settings → Pages → Source: GitHub Actions)."
          echo "## ⚠️ Pages deployment skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The documentation was built successfully but could not be deployed to GitHub Pages." >> $GITHUB_STEP_SUMMARY
          echo "To enable deployment, go to **Settings → Pages** and set Source to **GitHub Actions**." >> $GITHUB_STEP_SUMMARY

  build-white-paper:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install tectonic
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://drop-sh.fullyjustified.net \
            | sh -s -- --prefix "$HOME/.local"
          # Installer may drop binary in cwd on some versions
          if [ -f tectonic ]; then
            mv tectonic "$HOME/.local/bin/tectonic"
          fi
          chmod +x "$HOME/.local/bin/tectonic"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build white paper PDF
        run: |
          cd docs/white_paper
          tectonic main.tex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: white-paper-pdf
          path: docs/white_paper/main.pdf
