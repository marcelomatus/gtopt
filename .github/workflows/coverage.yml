name: Coverage

# Dedicated workflow for C++ code-coverage reports.
#
# Produces:
#   - cpp-coverage-report : HTML coverage report (lcov/genhtml)
#
# Triggers:
#   - workflow_dispatch : manual run at any time (e.g. before a release)
#   - schedule          : every Sunday at 02:00 UTC (weekly baseline)
#
# This workflow is separate from the main ubuntu.yml so that the cost of
# coverage instrumentation (-fprofile-arcs -ftest-coverage) does not slow
# down every CI push.  The main workflow still accepts a manual
# ENABLE_COVERAGE override if needed.

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: 'Compiler to use (clang or gcc)'
        type: choice
        options:
          - clang
          - gcc
        default: clang
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  # Coverage is always enabled in this workflow
  ENABLE_COVERAGE: 'true'
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_SLOPPINESS: gcno_file_location

permissions:
  contents: read

jobs:
  cpp-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    name: C++ coverage (${{ inputs.compiler || 'clang' }})

    steps:
      - uses: actions/checkout@v4

      - name: Set compiler environment
        id: compiler
        run: |
          COMPILER="${{ inputs.compiler || 'clang' }}"
          if [ "$COMPILER" = "gcc" ]; then
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
            echo "GCOV_TOOL=gcov-14" >> $GITHUB_ENV
            echo "ACTIVE_COMPILER=gcc" >> $GITHUB_ENV
          else
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
            echo "GCOV_TOOL=/tmp/llvm-gcov.sh" >> $GITHUB_ENV
            echo "ACTIVE_COMPILER=clang" >> $GITHUB_ENV
          fi

      - name: setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: coverage-${{ inputs.compiler || 'clang' }}
          restore-keys: |
            coverage-${{ inputs.compiler || 'clang' }}-
          max-size: 2G

      - uses: actions/cache@v4
        with:
          path: "**/cpm_modules"
          key: coverage-${{ inputs.compiler || 'clang' }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: install dependencies
        uses: ./.github/actions/install-apt-deps
        with:
          extra-packages: lcov

      - name: setup gcc
        if: ${{ (inputs.compiler || 'clang') == 'gcc' }}
        uses: ./.github/actions/install-gcc
        with:
          version: 14

      - name: install clang
        if: ${{ (inputs.compiler || 'clang') == 'clang' }}
        uses: ./.github/actions/install-clang
        with:
          version: 21
          install-coverage-runtime: 'true'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv
        run: pip install uv

      - name: Pre-install scripts dependencies
        run: uv pip install --system -q -e "./scripts[dev]" graphviz

      - name: configure (with coverage)
        run: |
          cmake -S all -B build -DENABLE_TEST_COVERAGE=1 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        env:
          CC: ${{ env.CC }}
          CXX: ${{ env.CXX }}

      - name: build
        run: cmake --build build -j$(nproc)

      - name: test
        run: |
          set -o pipefail
          cd build
          ctest --build-config Debug --output-on-failure -j$(nproc) 2>&1 | tee ctest_output.log
          echo "=== Test Summary ==="
          grep -c "Passed" ctest_output.log || true

      - name: collect C++ coverage
        run: |
          # Set up gcov tool wrapper for clang
          if [ "$ACTIVE_COMPILER" = "clang" ]; then
            printf '#!/bin/sh\nexec llvm-cov gcov "$@"\n' > /tmp/llvm-gcov.sh
            chmod +x /tmp/llvm-gcov.sh
          fi
          GCOV_TOOL="${GCOV_TOOL}"
          # Capture coverage data
          lcov --capture --directory build --output-file coverage-raw.info \
            --gcov-tool "${GCOV_TOOL}" \
            --ignore-errors mismatch,mismatch \
            --ignore-errors unexecuted,unexecuted \
            --ignore-errors negative,negative \
            --ignore-errors inconsistent,inconsistent \
            --rc geninfo_unexecuted_blocks=1 \
            --rc branch_coverage=1
          # Remove external/test/system files
          lcov --remove coverage-raw.info \
            '/usr/*' \
            '*/cpm_modules/*' \
            '*/test/*' \
            '*/daw/*' \
            '*/strong_type/*' \
            '*/spdlog/*' \
            --output-file coverage.info \
            --gcov-tool "${GCOV_TOOL}" \
            --ignore-errors unused,unused,inconsistent,inconsistent \
            --rc branch_coverage=1
          # Print summary
          lcov --list coverage.info --gcov-tool "${GCOV_TOOL}" \
            --rc branch_coverage=1 \
            --ignore-errors inconsistent,inconsistent
          # Generate HTML report
          genhtml coverage.info --output-directory coverage-report \
            --title "gtopt C++ Coverage" \
            --legend --show-details \
            --rc branch_coverage=1 \
            --ignore-errors inconsistent,inconsistent

      - name: upload C++ coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cpp-coverage-report-${{ inputs.compiler || 'clang' }}
          path: coverage-report/
          retention-days: 30

      - name: C++ coverage summary
        run: |
          GCOV_TOOL="${GCOV_TOOL}"
          if [ ! -f coverage.info ]; then
            echo "⚠️ Coverage data not available." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          SUMMARY=$(lcov --summary coverage.info --gcov-tool "${GCOV_TOOL}" \
            --rc branch_coverage=1 \
            --ignore-errors inconsistent,inconsistent 2>&1) || true
          LINE_PCT=$(echo "$SUMMARY" | grep 'lines' | head -1 | grep -oP '[\d.]+%' | head -1)
          LINE_DETAIL=$(echo "$SUMMARY" | grep 'lines' | head -1 | grep -oP '\(.*\)')
          FUNC_PCT=$(echo "$SUMMARY" | grep 'functions' | head -1 | grep -oP '[\d.]+%' | head -1)
          FUNC_DETAIL=$(echo "$SUMMARY" | grep 'functions' | head -1 | grep -oP '\(.*\)')
          BRANCH_PCT=$(echo "$SUMMARY" | grep 'branches' | head -1 | grep -oP '[\d.]+%' | head -1)
          BRANCH_DETAIL=$(echo "$SUMMARY" | grep 'branches' | head -1 | grep -oP '\(.*\)')
          echo "## C++ Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${LINE_PCT} | ${LINE_DETAIL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNC_PCT} | ${FUNC_DETAIL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCH_PCT} | ${BRANCH_DETAIL} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Highlight files with 0% coverage
          ZERO_FILES=$(lcov --list coverage.info --gcov-tool "${GCOV_TOOL}" \
            --rc branch_coverage=1 2>&1 | grep '|.*0\.0%' | head -20 || true)
          if [ -n "$ZERO_FILES" ]; then
            echo "<details><summary>⚠️ Files with 0% line coverage (gaps)</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$ZERO_FILES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          echo "📥 Download the full HTML report from the **cpp-coverage-report** artifact." >> $GITHUB_STEP_SUMMARY

  python-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    name: Python coverage (scripts/)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-scripts-cov-${{ hashFiles('scripts/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-scripts-

      - name: Install uv and scripts
        run: |
          pip install uv
          uv pip install --system -q -e "./scripts[dev]" graphviz

      - name: Run Python tests with coverage
        run: |
          cd scripts
          python -m pytest \
            --cov=cvs2parquet \
            --cov=igtopt \
            --cov=plp2gtopt \
            --cov=pp2gtopt \
            --cov=ts2gtopt \
            --cov=gtopt_compare \
            --cov=gtopt_diagram \
            --cov-report=term-missing \
            --cov-report=html:../python-coverage-report \
            --cov-report=xml:../python-coverage.xml \
            -q 2>&1 | tee pytest_output.txt
          echo "=== Coverage Summary ==="
          grep -E "^TOTAL|coverage" pytest_output.txt | tail -5 || true

      - name: upload Python coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: python-coverage-report/
          retention-days: 30

      - name: Python coverage summary
        run: |
          cd scripts
          echo "## Python Coverage Report (scripts/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -m pytest \
            --cov=cvs2parquet \
            --cov=igtopt \
            --cov=plp2gtopt \
            --cov=pp2gtopt \
            --cov=ts2gtopt \
            --cov=gtopt_compare \
            --cov=gtopt_diagram \
            --cov-report=term-missing \
            -q --no-header 2>&1 | tail -30 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the full HTML report from the **python-coverage-report** artifact." >> $GITHUB_STEP_SUMMARY
